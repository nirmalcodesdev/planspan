# PlanSpan auto_explain config — append to postgresql.conf
# (or drop in /etc/postgresql/17/main/conf.d/planspan.conf)
#
# Needs restart, not reload: shared_preload_libraries only loads at startup.

shared_preload_libraries = 'auto_explain,pg_stat_statements'

# log every plan slower than 200ms, as JSON, with real timings + buffers
auto_explain.log_min_duration = 200ms
auto_explain.log_format = json
auto_explain.log_analyze = on
auto_explain.log_buffers = on
auto_explain.log_timing = on
auto_explain.log_verbose = on
auto_explain.log_nested_statements = on

# keep overhead bounded on a busy box — sample a fraction of qualifying stmts
# 1.0 = every slow query (fine for demo); dial down under real load
auto_explain.sample_rate = 1.0

# pg_stat_statements for the $ / call-rate math in Act 4
pg_stat_statements.max = 10000
pg_stat_statements.track = all
compute_query_id = on
